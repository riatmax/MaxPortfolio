<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maximus Riat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <div class="crt-overlay"></div>
    <div class="scanlines"></div>

    <div id="boot-screen">
      <pre id="boot-output"></pre>
    </div>

    <script>
const bootLines = [
  { text: "INITIALIZING BIOS v4.2.1...",                         delay: 60  },
  { text: "CPU: INTEL CORE i9 @ 3.90GHz [OK]",                  delay: 40  },
  { text: "RAM: 32768MB DDR5 DETECTED [OK]",                     delay: 40  },
  { text: "GPU: NVIDIA RTX 4090 24GB [OK]",                      delay: 40  },
  { text: "",                                                     delay: 20  },
  { text: "RUNNING MEMORY DIAGNOSTICS...",                        delay: 80  },
  { text: "[####################] 16384MB / 16384MB  PASS",      delay: 60  },
  { text: "[####################] 16384MB / 16384MB  PASS",      delay: 60  },
  { text: "MEMORY CHECK COMPLETE. NO ERRORS FOUND.",             delay: 60  },
  { text: "",                                                     delay: 20  },
  { text: "LOADING BOOT SECTOR...",                               delay: 80  },
  { text: "VERIFYING FILESYSTEM INTEGRITY...",                    delay: 80  },
  { text: "[ OK ] /dev/sda1 mounted",                            delay: 40  },
  { text: "[ OK ] /dev/sda2 mounted",                            delay: 40  },
  { text: "[ OK ] SWAP space enabled",                           delay: 40  },
  { text: "",                                                     delay: 20  },
  { text: "LOADING KERNEL MODULES...",                            delay: 80  },
  { text: "[ OK ] net.ipv4.tcp_syncookies",                      delay: 30  },
  { text: "[ OK ] vm.swappiness = 10",                           delay: 30  },
  { text: "[ OK ] fs.inotify.max_user_watches",                  delay: 30  },
  { text: "",                                                     delay: 20  },
  { text: "ESTABLISHING NETWORK CONNECTION...",                   delay: 100 },
  { text: "IP ADDRESS: 192.168.1.1",                             delay: 40  },
  { text: "GATEWAY: 192.168.1.254  [REACHABLE]",                 delay: 40  },
  { text: "DNS: 8.8.8.8            [REACHABLE]",                 delay: 40  },
  { text: "",                                                     delay: 20  },
  { text: "LOADING USER PROFILE...",                              delay: 100 },
  { text: "DECRYPTING CREDENTIALS...",                            delay: 80  },
  { text: "[ OK ] IDENTITY VERIFIED",                            delay: 60  },
  { text: "[ OK ] PERMISSIONS GRANTED",                          delay: 60  },
  { text: "",                                                     delay: 20  },
  { text: "MOUNTING USER_PROFILE.IMG...",                         delay: 80  },
  { text: "[ OK ] ASCII_ART.DAT loaded",                         delay: 40  },
  { text: "[ OK ] PORTFOLIO_DATA.JSON loaded",                   delay: 40  },
  { text: "[ OK ] EXPERIENCE_LOG.TXT loaded",                    delay: 40  },
  { text: "",                                                     delay: 20  },
  { text: "ALL SYSTEMS NOMINAL.",                                 delay: 100 },
  { text: "WELCOME.",                                             delay: 200 },
  { text: "",                                                     delay: 400 },
];

const bootOutput = document.getElementById('boot-output');
let lineIdx = 0;
let timeouts = [];

function runBoot() {
  if (lineIdx >= bootLines.length) {
    transitionToSite();
    return;
  }
  const { text, delay } = bootLines[lineIdx++];
  bootOutput.textContent += text + '\n';
  bootOutput.scrollTop = bootOutput.scrollHeight;
  const t = setTimeout(runBoot, delay);
  timeouts.push(t);
}

function transitionToSite() {
  const bootScreen = document.getElementById('boot-screen');
  bootScreen.style.opacity = '0';
  bootScreen.style.transition = 'opacity 0.8s ease';
  setTimeout(() => { window.location.href = 'main.html'; }, 800);
}

runBoot();
    </script>
  </body>
</html>
